<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Expense Tracker</title>
  <meta name="theme-color" content="#c96c3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Expenses">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div>
        <h1>Expense Tracker</h1>
        <p id="sync-status" class="status-message" data-variant="info">Loading expenses...</p>
      </div>
      <div class="hero-card">
        <p class="hero-label">Current week</p>
        <p class="hero-total" id="period-total">$0.00</p>
        <p class="hero-subtitle" id="period-label">Sunday to Saturday</p>
      </div>
    </section>

    <section class="panel-grid">
      <section class="panel">
        <div class="panel-heading">
          <h2>Add expense</h2>
          <p>Track one purchase at a time.</p>
        </div>
        <form id="expense-form" class="stack">
          <label>
            Amount
            <input type="number" step="0.01" min="0" name="amount" placeholder="42.50" required>
          </label>
          <label>
            Category
            <select name="category" id="expense-category" required></select>
          </label>
          <label>
            Date
            <input type="date" name="date" id="expense-date" required>
          </label>
          <label>
            Note
            <input type="text" name="note" placeholder="Optional">
          </label>
          <button type="submit">Add expense</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Add category</h2>
          <p>Create your own spending buckets.</p>
        </div>
        <form id="category-form" class="inline-form">
          <input type="text" name="categoryName" placeholder="Groceries" maxlength="30" required>
          <button type="submit">Add</button>
        </form>
        <div id="category-list" class="chip-row"></div>
      </section>
    </section>

    <section class="panel">
      <div class="dashboard-header">
        <div>
          <h2>Spending dashboard</h2>
          <p id="dashboard-range">This week</p>
        </div>
      </div>

      <div class="chart-shell">
        <div id="chart" class="chart"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-heading">
        <h2>Recent expenses</h2>
        <p>Newest entries first.</p>
      </div>
      <div id="expense-list" class="expense-list"></div>
    </section>
  </main>

  <template id="expense-item-template">
    <article class="expense-item">
      <div>
        <p class="expense-category"></p>
        <p class="expense-note"></p>
      </div>
      <div class="expense-actions">
        <div class="expense-meta">
        <p class="expense-amount"></p>
        <p class="expense-date"></p>
        </div>
        <button type="button" class="delete-button delete-expense">Delete</button>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }
  </script>
</body>
</html>
